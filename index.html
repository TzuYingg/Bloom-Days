<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F2F0EC">
<title>Bloom-Days</title>
<meta name="apple-mobile-web-app-title" content="Bloom-Days">
<meta name="application-name" content="Bloom-Days">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="bloom-days-180.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2232%22%20height%3D%2232%22%20viewBox%3D%220%200%20512%20512%22%3E%3Crect%20width%3D%22512%22%20height%3D%22512%22%20fill%3D%22%23E8DFCC%22%2F%3E%3Ccircle%20cx%3D%22256%22%20cy%3D%22256%22%20r%3D%22176%22%20fill%3D%22%23F3ECDC%22%2F%3E%3Cg%20transform%3D%22translate%28256%2C256%29%22%3E%3Cellipse%20cx%3D%220%22%20cy%3D%22-78%22%20rx%3D%2248%22%20ry%3D%2282%22%20fill%3D%22%2384A2C6%22%20transform%3D%22rotate%280%29%22%2F%3E%3Cellipse%20cx%3D%220%22%20cy%3D%22-78%22%20rx%3D%2248%22%20ry%3D%2282%22%20fill%3D%22%2384A2C6%22%20transform%3D%22rotate%2872%29%22%2F%3E%3Cellipse%20cx%3D%220%22%20cy%3D%22-78%22%20rx%3D%2248%22%20ry%3D%2282%22%20fill%3D%22%2384A2C6%22%20transform%3D%22rotate%28144%29%22%2F%3E%3Cellipse%20cx%3D%220%22%20cy%3D%22-78%22%20rx%3D%2248%22%20ry%3D%2282%22%20fill%3D%22%2384A2C6%22%20transform%3D%22rotate%28216%29%22%2F%3E%3Cellipse%20cx%3D%220%22%20cy%3D%22-78%22%20rx%3D%2248%22%20ry%3D%2282%22%20fill%3D%22%2384A2C6%22%20transform%3D%22rotate%28288%29%22%2F%3E%3Ccircle%20r%3D%2246%22%20fill%3D%22%23F4CE6E%22%2F%3E%3Ccircle%20r%3D%2226%22%20fill%3D%22%23F7E3A4%22%2F%3E%3Ccircle%20r%3D%229%22%20fill%3D%22%23E3A63C%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#EEE8DC; --card:#FBF7EF; --ink:#3A362F; --muted:#9A9186;
    --hair:#E7E0D3; --accent:#4A6FA5; --accent-soft:rgba(74,111,165,.12); --radius:20px;
    --shadow:0 6px 20px rgba(78,64,48,.06); --shadow-sm:0 2px 12px rgba(78,64,48,.055);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:"Noto Sans TC",system-ui,sans-serif;background:var(--cream);color:var(--ink);font-weight:400;line-height:1.5;overflow:hidden;transition:background .4s ease;}
  #app{max-width:460px;margin:0 auto;height:100svh;display:flex;flex-direction:column;position:relative;}

  header{padding:26px 24px 10px;}
  .greet-line{font-size:13px;color:var(--muted);letter-spacing:.06em;}
  .greet-line .dow{color:var(--muted);}
  .daily-msg{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:500;color:var(--ink);line-height:1.5;margin-top:10px;max-width:97%;}

  /* bottom tab bar */
  .tabbar{position:absolute;left:0;right:0;bottom:0;z-index:4;display:flex;
    background:rgba(251,247,239,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--hair);padding:6px 4px calc(6px + env(safe-area-inset-bottom));
    box-shadow:0 -6px 22px rgba(78,64,48,.06);}
  .tabbar .view-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    background:none;border:none;cursor:pointer;font-family:inherit;font-size:10px;
    color:var(--muted);padding:5px 2px;border-radius:14px;transition:color .2s ease;}
  .tabbar .view-btn .ti{width:27px;height:27px;display:flex;align-items:center;justify-content:center;
    opacity:.5;transition:opacity .2s ease,transform .16s ease;}
  .tabbar .view-btn .ti .ic{width:27px;height:27px;}
  .tabbar .view-btn .tl{letter-spacing:.05em;opacity:.8;}
  .tabbar .view-btn.on{color:var(--accent);}
  .tabbar .view-btn.on .ti{opacity:1;transform:translateY(-1px);}
  .tabbar .view-btn.on .tl{opacity:1;font-weight:500;}
  .tabbar .view-btn:active .ti{transform:scale(.88);}

  main{flex:1;overflow-y:auto;padding:16px 22px calc(150px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch;}

  /* mode bar */
  .modebar{display:flex;gap:8px;overflow-x:auto;padding:6px 4px 4px;scrollbar-width:none;}
  .modebar::-webkit-scrollbar{display:none;}
  .mode-chip{flex:none;background:var(--card);border:none;border-radius:24px;padding:11px 18px;cursor:pointer;font-family:inherit;font-size:15px;color:var(--muted);display:flex;align-items:center;gap:7px;box-shadow:var(--shadow-sm);transition:all .2s ease;}
  .mode-chip.on{background:var(--accent-soft);color:var(--ink);font-weight:500;box-shadow:none;}
  .mode-chip .em{font-size:15px;}
  .mode-hint{font-family:"Noto Serif TC",serif;font-size:15px;color:var(--ink);opacity:.7;padding:2px 4px 14px;line-height:1.6;}
  /* 精簡版時間分布 */
  .tbmini{margin:2px 2px 16px;}
  .tbmini-bar{display:flex;height:6px;border-radius:4px;overflow:hidden;background:var(--hair);}
  .tbmini-bar span{height:100%;}
  .tbmini-leg{display:flex;flex-wrap:wrap;align-items:center;gap:5px 12px;margin-top:9px;font-size:11.5px;color:var(--muted);}
  .tbm-tot{color:var(--ink);font-weight:500;letter-spacing:.02em;}
  .tbm-item{display:inline-flex;align-items:center;gap:5px;}
  .tbm-dot{width:7px;height:7px;border-radius:50%;flex:none;}
  .today-wrap{display:flex;gap:12px;align-items:flex-start;}
  .mode-rail{display:flex;flex-direction:column;gap:8px;flex:none;width:62px;position:sticky;top:2px;z-index:1;}
  .rail-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);border:none;border-radius:16px;padding:12px 4px;cursor:pointer;font-family:inherit;font-size:11.5px;color:var(--muted);box-shadow:var(--shadow-sm);transition:all .18s ease;}
  .rail-btn .ic{width:24px;height:24px;}
  .rail-btn.on{background:var(--accent-soft);color:var(--ink);font-weight:500;box-shadow:none;}
  .rail-btn:active{transform:scale(.96);}

  /* 今日模式列（改到上方）— 四種排版可切換 */
  .modetop{display:flex;gap:8px;margin:2px 0 8px;}
  .modetop .mbtn{cursor:pointer;font-family:inherit;border:none;background:none;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .18s ease;}
  .modetop .mbtn:active{transform:scale(.96);}
  .modetop .mbtn .ic{width:25px;height:25px;flex:none;}
  .ml-tiles .mbtn{flex:1;flex-direction:column;gap:4px;background:var(--card);border-radius:16px;padding:12px 4px 10px;font-size:12.5px;box-shadow:var(--shadow-sm);}
  .ml-tiles .mbtn.on{background:var(--accent-soft);color:var(--ink);font-weight:500;box-shadow:none;}
  .ml-pills{overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .ml-pills::-webkit-scrollbar{display:none;}
  .ml-pills .mbtn{flex:none;flex-direction:row;gap:6px;background:var(--card);border-radius:22px;padding:10px 16px;font-size:14px;box-shadow:var(--shadow-sm);}
  .ml-pills .mbtn .ic{width:22px;height:22px;}
  .ml-pills .mbtn.on{background:var(--accent-soft);color:var(--ink);font-weight:500;box-shadow:none;}
  .ml-icons{gap:10px;justify-content:flex-start;flex-wrap:wrap;}
  .ml-icons .mbtn{flex-direction:row;gap:6px;background:var(--card);border-radius:50px;padding:11px;box-shadow:var(--shadow-sm);}
  .ml-icons .mbtn span{display:none;font-size:14px;}
  .ml-icons .mbtn.on{background:var(--accent-soft);color:var(--ink);font-weight:500;box-shadow:none;padding:11px 17px;}
  .ml-icons .mbtn.on span{display:inline;}
  .ml-underline{gap:0;border-bottom:1px solid var(--hair);margin-bottom:12px;}
  .ml-underline .mbtn{flex:1;flex-direction:column;gap:5px;padding:8px 4px 12px;font-size:12.5px;border-radius:0;position:relative;}
  .ml-underline .mbtn.on{color:var(--ink);font-weight:500;}
  .ml-underline .mbtn.on::after{content:"";position:absolute;left:22%;right:22%;bottom:-1px;height:2.5px;border-radius:2px;background:var(--accent);}
  .today-col{flex:1;min-width:0;}
  .today-col .mode-hint{padding:2px 2px 14px;}
  .today-col .breathe{margin:0 0 10px;}
  .breathe{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:none;border-radius:22px;padding:9px 16px 9px 12px;margin:2px 4px 10px;font-family:inherit;font-size:13.5px;color:var(--muted);cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s ease;}
  .breathe:active{transform:scale(.97);}
  .breathe .ic{width:20px;height:20px;}
  .show-other{display:block;width:100%;background:none;border:none;border-top:1px dashed var(--hair);margin-top:12px;padding:16px 4px 2px;font-family:inherit;font-size:13px;color:var(--muted);cursor:pointer;text-align:center;}
  .other-label{font-size:12px;color:var(--muted);letter-spacing:.08em;padding:18px 4px 8px;}
  .agenda.dim{opacity:.6;}
  .sheet.micro .micro-item{display:block;width:100%;text-align:left;font-family:inherit;font-size:16px;color:var(--ink);background:var(--card);border:none;border-radius:16px;padding:16px 17px;margin-bottom:9px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .16s ease;}
  .sheet.micro .micro-item:active{background:var(--accent-soft);}
  .micro-done{font-family:"Noto Serif TC",serif;font-size:20px;color:var(--ink);text-align:center;padding:26px 10px 30px;line-height:1.5;}

  .agenda{display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;align-items:flex-start;gap:14px;background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);animation:rise .35s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .dot{width:20px;height:20px;border-radius:50%;flex:none;margin-top:2px;border:2px solid var(--accent);cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;}
  .dot svg{width:11px;height:11px;opacity:0;transition:opacity .2s ease;}
  .row.done .dot{background:currentColor;}
  .row.done .dot svg{opacity:1;}
  .star-toggle{align-self:center;flex:none;width:22px;height:22px;border:none;background:none;cursor:pointer;font-size:18px;line-height:1;color:var(--hair);transition:all .15s ease;padding:0;}
  .star-toggle.on{color:#E7B24E;}
  .star-toggle:active{transform:scale(.85);}
  .ev-mark{width:20px;height:20px;border-radius:6px;flex:none;margin-top:2px;}
  .row-body{flex:1;min-width:0;cursor:pointer;}
  .row-body:active .row-title{opacity:.55;}
  .row-time{font-size:12px;color:var(--muted);letter-spacing:.04em;margin-bottom:2px;font-variant-numeric:tabular-nums;}
  .row-title{font-size:16px;color:var(--ink);word-break:break-word;transition:color .2s ease;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row.done .row-title{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--hair);}
  .row-meta{display:flex;align-items:center;flex-wrap:nowrap;overflow:hidden;gap:5px;font-size:12px;color:var(--muted);margin-top:5px;white-space:nowrap;}
  .row-meta .ml-ic .ic{width:16px;height:16px;vertical-align:-3px;flex:none;}
  .row-meta .ml-sep{opacity:.4;}
  .row-meta .ml-due.soon{color:#B07A4E;}
  .row-meta .ml-mig{flex:none;}
  .row-meta .ml-mig[data-migratepull]{color:var(--accent);cursor:pointer;}
  .meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:12px;color:var(--muted);margin-top:7px;}
  .meta .cat{font-weight:500;}
  .meta .sep{opacity:.4;}
  .meta .em{font-size:15px;}
  .ic{width:22px;height:22px;display:inline-block;vertical-align:-5px;flex:none;}
  .mode-chip .ic{width:26px;height:26px;vertical-align:-7px;margin-right:4px;}
  .meta .cat{display:inline-flex;align-items:center;gap:5px;}
  .meta .cat .ic{width:21px;height:21px;vertical-align:-5px;}
  .chips .ic{width:22px;height:22px;vertical-align:-5px;margin-right:3px;}
  .meta .mi{display:inline-flex;align-items:center;gap:3px;}
  .meta .ic{width:19px;height:19px;vertical-align:-4px;}
  .due-note{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);margin-top:7px;letter-spacing:.02em;}
  .due-note .ic{width:15px;height:15px;vertical-align:-3px;}
  .due-note.soon{color:#B07A4E;}
  .pip.due{background:none;border:1.5px solid #B8AE9C;box-sizing:border-box;}
  .recur-intro{font-family:"Noto Serif TC",serif;font-size:14.5px;color:var(--ink);opacity:.68;padding:10px 4px 18px;line-height:1.7;}
  .rec-ic{flex:none;margin-top:1px;}
  .rec-ic .ic{width:24px;height:24px;}
  .add-recur{display:block;width:100%;background:var(--card);border:1px dashed var(--hair);border-radius:16px;padding:16px;margin-top:14px;font-family:inherit;font-size:15px;color:var(--accent);cursor:pointer;transition:all .18s ease;}
  .add-recur:active{background:var(--accent-soft);}
  .chips.need{outline:1.5px solid #C99A6A;outline-offset:4px;border-radius:12px;}
  .quad{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .hcard{position:relative;background:var(--card);border-radius:18px;padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:all .16s ease;}
  .hcard.on{background:rgba(124,154,94,.14);}
  .hcard:active{transform:scale(.98);}
  .hhead{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
  .hhead .ic{width:26px;height:26px;flex:none;}
  .hn{font-size:15px;color:var(--ink);}
  .hp{font-size:11px;color:#b0a595;margin-top:1px;}
  .pbar{height:7px;background:#EDE6D9;border-radius:4px;overflow:hidden;}
  .pfill{height:100%;border-radius:4px;background:#8CB06A;transition:width .3s ease;}
  .hmeta{font-size:11.5px;color:var(--muted);margin-top:9px;}
  .hbig{font-size:13px;color:var(--muted);margin-top:4px;}
  .hcard.on .hbig{color:#7c9a5e;}
  .hdec{position:absolute;top:10px;right:10px;width:24px;height:24px;border:none;background:var(--cream);border-radius:50%;color:var(--muted);font-size:16px;line-height:1;cursor:pointer;z-index:2;}
  .jars-title{font-size:12px;color:var(--muted);letter-spacing:.06em;padding:26px 4px 4px;}
  .jars{display:flex;justify-content:space-around;align-items:flex-end;padding:6px 0 4px;}
  .jarcol{text-align:center;}
  .jl{font-size:13.5px;margin-top:6px;color:var(--ink);}
  .jn{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .milestone{display:flex;align-items:center;gap:11px;background:var(--card);border-radius:18px;padding:16px 18px;margin-top:18px;box-shadow:var(--shadow);font-size:13px;color:#6f685c;line-height:1.7;}
  .medal{display:flex;align-items:center;gap:12px;background:#F4EAD3;border-radius:16px;padding:14px 16px;margin-top:12px;box-shadow:var(--shadow-sm);}
  .medal .ic{width:27px;height:27px;flex:none;}
  .medal-t{font-size:13px;color:#8a6a4a;font-weight:500;}
  .medal-n{font-size:11.5px;color:#a08862;margin-top:2px;letter-spacing:.01em;}
  .milestone .ic{width:22px;height:22px;flex:none;}
  .bigcard{background:var(--card);border-radius:20px;padding:20px;margin-top:14px;box-shadow:var(--shadow);}
  .bc-title{font-family:"Noto Serif TC",serif;font-size:16px;font-weight:500;display:flex;align-items:center;gap:8px;}
  .bc-title .ic{width:24px;height:24px;}
  .bc-q{font-size:13px;color:var(--muted);margin:6px 0 16px;line-height:1.6;}
  .moonrow{display:flex;gap:8px;}
  .moonopt{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--cream);border:none;border-radius:14px;padding:14px 4px;cursor:pointer;font-family:inherit;font-size:11.5px;color:var(--muted);transition:all .16s ease;}
  .moonopt .ic{width:30px;height:30px;}
  .moonopt.on{background:rgba(138,134,152,.18);color:var(--ink);font-weight:500;}
  .bc-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:12px;}
  .trail-label,.star-label{font-size:11.5px;color:var(--muted);letter-spacing:.05em;margin:20px 0 8px;}
  .trail{display:flex;flex-wrap:wrap;gap:5px;}
  .tm .ic{width:20px;height:20px;display:block;}
  .trail-empty{font-size:12px;color:var(--muted);}
  .langrow{display:flex;gap:8px;margin-bottom:14px;}
  .langt{flex:1;background:var(--cream);border:none;border-radius:14px;padding:12px;cursor:pointer;font-family:inherit;font-size:14px;color:var(--muted);transition:all .16s ease;}
  .langt.on{background:var(--accent-soft);color:var(--ink);font-weight:500;}
  .wordadd{display:flex;flex-direction:column;gap:9px;}
  .wordadd input{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--cream);border:none;border-radius:12px;padding:13px 14px;outline:none;}
  .wordbtn{background:var(--accent-soft);color:var(--accent);border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;}
  .star-label{margin-top:18px;}
  .bubbles{display:flex;flex-wrap:wrap;gap:8px;}
  .bubble{border:none;border-radius:16px;padding:10px 14px;background:linear-gradient(135deg,#ECE5F0,#E4EEEF);color:var(--ink);font-family:inherit;font-size:13.5px;cursor:pointer;box-shadow:var(--shadow-sm);max-width:100%;text-align:left;}
  .bubble .back{display:none;color:#6f685c;font-size:12.5px;}
  .bubble.flip .front{display:none;}
  .bubble.flip .back{display:inline;}
  .grat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .grat-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--cream);border-radius:12px;padding:11px 12px 11px 14px;font-size:14px;color:var(--ink);line-height:1.5;}
  .grat-item span{word-break:break-word;}
  .grat-item button{flex:none;background:none;border:none;color:var(--muted);font-size:16px;line-height:1;cursor:pointer;padding:2px 4px;}
  .grat-day{display:flex;gap:10px;font-size:12.5px;color:var(--muted);line-height:1.7;}
  .grat-day-date{flex:none;color:var(--ink);opacity:.6;font-variant-numeric:tabular-nums;}
  .grat-day-items{flex:1;}
  .care-banner{background:rgba(176,122,78,.1);border-radius:16px;padding:14px 16px;margin-bottom:8px;font-size:13px;color:#8a6a4a;line-height:1.6;}
  .rv-hero{text-align:center;padding:14px 20px 22px;}
  .rv-num{font-family:"Noto Serif TC",serif;font-size:52px;font-weight:500;color:var(--accent);line-height:1;}
  .rv-cap{font-family:"Noto Serif TC",serif;color:var(--ink);opacity:.72;font-size:15px;margin-top:10px;line-height:1.7;}
  .rv-cats{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;margin-bottom:14px;}
  .rv-cats .rv-chip{margin:0 7px;}
  .rv-cats .rv-chip:first-child{margin-left:0;}

  .rv-filter{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 2px 4px;margin-bottom:20px;}
  .rv-filter::-webkit-scrollbar{display:none;}
  .rv-fbtn{flex:none;font-size:11.5px;padding:6px 13px;border-radius:14px;background:var(--card);color:var(--muted);border:none;white-space:nowrap;cursor:pointer;}
  .rv-fbtn.on{background:var(--accent);color:#fff;}

  .rv-week{font-size:10.5px;color:#B0A595;padding:2px 2px 9px;}
  .stamp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
  .stamp{width:100%;aspect-ratio:1;border-radius:50%;background:var(--card);border:1.6px dashed var(--hair);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .stamp .ic{width:17px;height:17px;}

  .detail-card{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.94);width:260px;max-width:78%;background:var(--card);border-radius:18px;padding:24px 20px 20px;box-shadow:0 8px 24px rgba(58,54,47,.25);z-index:7;opacity:0;pointer-events:none;transition:opacity .18s ease, transform .18s ease;text-align:center;}
  .detail-card.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
  .dc-close{position:absolute;top:12px;right:14px;font-size:16px;color:var(--muted);cursor:pointer;line-height:1;}
  .dc-ic{width:52px;height:52px;margin:0 auto 12px;border-radius:50%;background:var(--cream);border:1.6px dashed var(--hair);display:flex;align-items:center;justify-content:center;}
  .dc-ic .ic{width:20px;height:20px;}
  .dc-title{font-family:"Noto Serif TC",serif;font-size:16px;color:var(--ink);margin-bottom:6px;}
  .dc-cat{font-size:11.5px;margin-bottom:12px;}
  .dc-ctx{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:2px;}
  .dc-ctx span{font-size:10.5px;background:var(--cream);color:#8A6E52;padding:3px 9px;border-radius:8px;}
  .dc-hr{height:1px;background:var(--hair);margin:12px 0;}
  .dc-meta{font-size:12px;color:var(--muted);line-height:1.8;}
  .timebar-wrap{background:var(--card);border-radius:18px;padding:16px 18px;margin-bottom:6px;box-shadow:var(--shadow-sm);}
  .tb-title{font-size:12.5px;color:var(--muted);margin-bottom:10px;}
  .timebar{display:flex;height:14px;border-radius:8px;overflow:hidden;background:var(--cream);}
  .timebar span{height:100%;}
  .tb-leg{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:12px;}
  .tl-item{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--muted);}
  .tl-item .ic{width:15px;height:15px;}
  .row-del{background:none;border:none;color:var(--hair);font-size:18px;cursor:pointer;padding:2px 4px;line-height:1;flex:none;transition:color .2s ease;}
  .row-del:hover,.row-del:active{color:var(--muted);}

  .empty{text-align:center;color:var(--muted);padding:52px 24px;font-size:14px;line-height:2;}
  .empty .big{font-family:"Noto Serif TC",serif;font-size:22px;color:var(--ink);display:block;margin-bottom:8px;opacity:.65;}

  .cal-head{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 14px;}
  .cal-month{font-family:"Noto Serif TC",serif;font-size:19px;font-weight:500;}
  .cal-nav{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;padding:4px 12px;}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
  .weekdays span{text-align:center;font-size:11px;color:var(--muted);padding:4px 0;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cell{min-height:58px;min-width:0;border:none;background:none;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;gap:2px;border-radius:10px;color:var(--ink);font-size:14px;transition:background .18s ease;position:relative;padding:4px 3px 5px;text-align:left;overflow:hidden;}
  .cell.other{color:var(--hair);}
  .cell.today .num{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
  .cell.sel{background:var(--accent-soft);}
  .cell .num{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;font-size:12px;flex:none;}
  .cell-top{display:flex;align-items:center;justify-content:space-between;flex:none;min-width:0;}
  .cell-due{width:5px;height:5px;border-radius:50%;border:1.3px solid #B8AE9C;box-sizing:border-box;flex:none;margin-right:2px;}
  .cell-tasks{display:flex;flex-direction:column;gap:2px;margin-top:2px;min-width:0;}
  .ct-chip{display:block;min-width:0;padding:2.5px 5px;border-radius:5px;font-size:8.5px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
  .ct-chip.done{opacity:.5;text-decoration:line-through;}
  .ct-chip.more{background:none;color:var(--muted);font-weight:400;padding:1px 5px;}
  .ct-chip.event{font-weight:600;text-align:center;}
  .ct-chip.event.seg-start{border-radius:5px 0 0 5px;margin-left:-3px;margin-right:-3px;padding-left:6px;}
  .ct-chip.event.seg-mid{border-radius:0;margin-left:-3px;margin-right:-3px;}
  .ct-chip.event.seg-end{border-radius:0 5px 5px 0;margin-right:-3px;margin-left:-3px;padding-right:6px;}
  .cal-legend{display:flex;gap:14px;padding:0 4px 12px;flex-wrap:wrap;}
  .lg-item{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--muted);}
  .lg-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;}
  .lg-arrow{font-size:9px;}
  .pips{display:flex;gap:3px;height:5px;}
  .pip{width:5px;height:5px;border-radius:50%;}
  .cal-sub{font-size:12px;color:var(--muted);padding:20px 4px 10px;letter-spacing:.04em;}

  /* 日曆三分頁：年目標／月曆／週曆 */
  .calsub{display:flex;gap:4px;background:var(--hair);border-radius:12px;padding:3px;margin-bottom:14px;}
  .calsub button{flex:1;border:none;background:none;padding:8px 0;font-size:12.5px;color:var(--muted);border-radius:9px;font-family:inherit;cursor:pointer;transition:all .16s ease;}
  .calsub button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm);}

  /* 月主題橫幅 */
  .theme-band{background:var(--card);border-radius:14px;padding:11px 13px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
  .tb-head{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;}
  .tb-label{font-family:"Noto Serif TC",serif;font-size:13px;color:var(--ink);line-height:1.5;}
  .tb-chev{font-size:11px;color:var(--muted);flex:none;}
  .tb-full{margin-top:10px;}
  .tb-full textarea{width:100%;border:none;background:var(--cream);border-radius:10px;padding:10px;font-family:"Noto Serif TC",serif;font-size:12.5px;color:var(--ink);resize:none;min-height:52px;outline:none;}
  .mg-list{margin-top:9px;}
  .mg-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .mg-check{width:16px;height:16px;border:1.3px solid var(--muted);border-radius:50%;flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;}
  .mg-check.on{background:var(--accent);border-color:var(--accent);}
  .mg-text{flex:1;font-size:12.5px;color:var(--ink);}
  .mg-text.done{color:var(--muted);text-decoration:line-through;}
  .mg-add{display:flex;gap:6px;margin-top:9px;}
  .mg-add input{flex:1;border:none;background:var(--cream);border-radius:9px;padding:8px 10px;font-family:inherit;font-size:12px;color:var(--ink);outline:none;}
  .mg-add button{border:none;background:var(--accent-soft);color:var(--accent);border-radius:9px;padding:0 13px;font-family:inherit;font-size:14px;cursor:pointer;}

  /* 必須做／順手做 */
  .mustdo-label,.easydo-label{font-family:"Noto Serif TC",serif;font-size:11.5px;color:var(--muted);margin:16px 2px 8px;}
  .mustdo-hint{font-size:11.5px;color:var(--muted);background:var(--card);border-radius:12px;padding:10px 13px;margin-bottom:8px;line-height:1.6;}
  .migrate-tag{font-size:10.5px;color:var(--muted);margin-top:5px;letter-spacing:.02em;}
  .migrate-pull{color:var(--accent);margin-left:8px;cursor:pointer;}

  /* 週曆 */
  .lifefilter{display:flex;gap:4px;margin-bottom:12px;}
  .lifefilter button{border:none;background:none;font-family:inherit;font-size:11px;color:var(--muted);padding:5px 12px;border-radius:20px;cursor:pointer;}
  .lifefilter button.on{background:var(--card);color:var(--ink);}
  .weekrow{display:flex;gap:12px;padding:10px 3px;border-bottom:1px solid var(--hair);}
  .weekrow:last-of-type{border-bottom:none;}
  .weekrow.sel{background:var(--accent-soft);border-radius:10px;}
  .wk-card{display:flex;gap:14px;background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow-sm);transition:box-shadow .2s ease;}
  .wk-card.today{box-shadow:var(--shadow);position:relative;}
  .wk-card.today::before{content:"";position:absolute;left:0;top:16px;bottom:16px;width:3px;border-radius:3px;background:var(--accent);}
  .wk-day{width:38px;flex:none;display:flex;flex-direction:column;gap:3px;padding-top:1px;}
  .wk-dow{font-family:"Noto Serif TC",serif;font-size:14.5px;color:var(--ink);}
  .wk-date{font-size:10.5px;color:var(--muted);letter-spacing:.02em;}
  .wk-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;}
  .wk-empty{font-size:12.5px;color:var(--muted);opacity:.7;}
  .wk-item{display:flex;align-items:flex-start;gap:10px;}
  .wk-item.event{align-items:baseline;}
  .wk-evmark{width:8px;height:8px;border-radius:2px;flex:none;align-self:center;}
  .wk-evtime{color:var(--ink);font-weight:600;margin-right:2px;}
  .wk-box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--muted);flex:none;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s ease;}
  .wk-title{flex:1;font-size:13px;color:var(--ink);line-height:1.6;cursor:pointer;}
  .wk-item.done .wk-title{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--hair);}
  .week-note{background:var(--card);border-radius:14px;padding:11px 13px;margin-top:14px;}
  .wn-label{font-family:"Noto Serif TC",serif;font-size:11.5px;color:var(--muted);margin-bottom:4px;}
  .week-note textarea{width:100%;border:none;background:none;font-family:"Noto Serif TC",serif;font-size:12px;color:var(--ink);resize:none;min-height:46px;outline:none;padding:0;}

  /* 年目標 */
  .yearpage{background-image:radial-gradient(rgba(58,54,47,.11) .6px, transparent .6px);background-size:14px 14px;border-radius:14px;padding:14px 10px;}
  .yr-keyword-input{font-family:"Noto Serif TC",serif;font-size:21px;color:var(--ink);border:none;background:none;width:100%;padding:0;outline:none;}
  .yr-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .yr-vision{width:100%;border:none;background:transparent;font-family:"Noto Serif TC",serif;font-size:12.5px;color:var(--ink);line-height:1.8;margin-top:10px;padding-bottom:12px;border-bottom:1px solid var(--hair);resize:none;min-height:52px;outline:none;}
  .quads{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  .qcard{background:var(--card);border-radius:12px;padding:10px 11px;}
  .qcard.now{box-shadow:var(--shadow);}
  .qlabel{font-family:"Noto Serif TC",serif;font-size:11px;color:var(--muted);margin-bottom:5px;}
  .qmonth{font-size:11px;color:var(--ink);line-height:2;}
  .qmonth input{width:78%;border:none;background:transparent;font-family:inherit;font-size:11px;color:var(--ink);padding:0;outline:none;}

  .fab{position:absolute;right:22px;bottom:calc(80px + env(safe-area-inset-bottom));width:58px;height:58px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:30px;font-weight:300;line-height:1;box-shadow:0 8px 22px rgba(78,64,48,.22);transition:background .4s ease,transform .12s ease;display:flex;align-items:center;justify-content:center;padding-bottom:3px;}
  .fab:active{transform:scale(.94);}
  .jot{position:absolute;right:26px;bottom:calc(150px + env(safe-area-inset-bottom));width:48px;height:48px;border-radius:16px;background:var(--card);border:none;cursor:pointer;box-shadow:0 6px 18px rgba(78,64,48,.16);display:flex;align-items:center;justify-content:center;transition:transform .12s ease;z-index:4;}
  .jot:active{transform:scale(.94);}
  .jot .ic{width:26px;height:26px;}
  .sheet.cap{background:#F4EAD3;}
  .sheet.cap textarea{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:transparent;border:none;outline:none;resize:none;line-height:1.7;}
  .wall{column-count:2;column-gap:10px;}
  .note-card{break-inside:avoid;display:inline-block;width:100%;background:#F6ECD6;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);}
  .nc-time{font-size:11px;color:#b3a37c;margin-bottom:6px;}
  .nc-text{font-size:14.5px;color:var(--ink);line-height:1.6;word-break:break-word;cursor:pointer;}
  .nc-text:active{opacity:.55;}
  .nc-acts{display:flex;align-items:center;gap:6px;margin-top:12px;flex-wrap:wrap;}
  .nc-btn{background:rgba(255,255,255,.65);border:none;border-radius:12px;padding:6px 10px;font-family:inherit;font-size:12px;color:#7a6a4a;cursor:pointer;display:inline-flex;align-items:center;gap:3px;}
  .nc-btn .ic{width:16px;height:16px;flex:none;}
  .nc-btn.today{color:#5E7DA8;}
  .nc-del{margin-left:auto;background:none;border:none;color:#c8b89a;font-size:16px;cursor:pointer;padding:2px 4px;line-height:1;}

  .scrim{position:absolute;inset:0;background:rgba(58,48,38,.32);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:5;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:6;background:var(--cream);border-radius:26px 26px 0 0;padding:24px 22px calc(20px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .3s cubic-bezier(.22,.61,.36,1);box-shadow:0 -10px 34px rgba(78,64,48,.14);max-height:90svh;overflow-y:auto;}
  .sheet.open{transform:translateY(0);}
  .sheet h3{font-family:"Noto Serif TC",serif;font-weight:500;font-size:18px;margin-bottom:0;}
  .sheet-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .star-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--cream);color:var(--hair);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;transition:all .15s ease;}
  .star-btn.on{color:#E7B24E;background:rgba(231,178,78,.14);}
  .choice-title{font-family:"Noto Serif TC",serif;font-size:17px;color:var(--ink);margin-bottom:16px;}
  .choice-row{display:flex;gap:12px;}
  .choice-card{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--cream);border:1.5px solid var(--hair);border-radius:18px;padding:22px 10px;cursor:pointer;font-family:inherit;transition:all .15s ease;}
  .choice-card:active{transform:scale(.97);}
  .choice-card .ic{width:40px;height:40px;}
  .choice-card .cname{font-family:"Noto Serif TC",serif;font-size:14px;color:var(--ink);}
  .row-fields{display:flex;gap:10px;margin-bottom:15px;}
  .row-fields .field{flex:1;margin-bottom:0;}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px;letter-spacing:.04em;}
  .field input{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:var(--card);border:1px solid var(--hair);border-radius:14px;padding:14px 15px;outline:none;transition:border-color .2s ease;}
  .field input:focus{border-color:var(--accent);}
  .field textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--card);border:1px solid var(--hair);border-radius:14px;padding:13px 15px;outline:none;resize:vertical;min-height:48px;line-height:1.6;transition:border-color .2s ease;}
  .field textarea:focus{border-color:var(--accent);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chips button{font-family:inherit;font-size:14px;padding:9px 13px;border-radius:20px;cursor:pointer;border:1px solid var(--hair);background:var(--card);color:var(--muted);transition:all .16s ease;display:flex;align-items:center;gap:6px;}
  .chips button.on{color:var(--ink);border-color:var(--accent);background:var(--accent-soft);font-weight:500;}
  .chips button .em{font-size:14px;}
  .eventonly{display:none;}
  #sheet.mode-event .taskonly{display:none;}
  #sheet.mode-event .field.eventonly{display:block;}
  #sheet.mode-event .row-fields.eventonly{display:flex;}
  .sheet-actions{display:flex;gap:10px;margin-top:20px;}
  .sheet-actions button{flex:1;font-family:inherit;font-size:16px;padding:14px;border-radius:12px;cursor:pointer;border:none;}
  .btn-cancel{background:var(--card);border:1px solid var(--hair)!important;color:var(--muted);}
  .btn-save{background:var(--accent);color:#fff;font-weight:500;transition:background .4s ease;}
  .btn-delete{background:none;border:1px solid rgba(200,123,134,.4)!important;color:#C87B86;flex:none!important;padding:14px 16px!important;}
  .btn-delete:active{background:rgba(200,123,134,.08);}

  /* 固定事項：日期下拉選單 */
  .field select.daysel{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:var(--card);border:1px solid var(--hair);border-radius:14px;padding:14px 40px 14px 15px;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none' stroke='%239A9186' stroke-width='1.6'><path d='M1 1.5 6 6.5 11 1.5'/></svg>");background-repeat:no-repeat;background-position:right 15px center;transition:border-color .2s ease;}
  .field select.daysel:focus{border-color:var(--accent);}
  .field select.daysel.need{border-color:#C99A6A;}

  /* 今日：排順序頁（沿用完整任務卡片，右側掛小號碼） */
  .ord-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .ord-head .mode-hint{margin:0;flex:1;}
  .now-tag{display:inline-block;font-size:11px;color:var(--accent);font-weight:500;background:var(--accent-soft);border-radius:10px;padding:2px 8px;margin-bottom:5px;}
  .row.now-card{box-shadow:0 3px 12px rgba(78,64,48,.14);}

  /* ===== Bloom 今日花園首頁 ===== */
  .bloom-head{padding:8px 2px 4px;position:relative;}
  .moodtap{position:absolute;top:6px;right:2px;display:flex;align-items:center;gap:5px;background:var(--cream);border:1px solid var(--hair);border-radius:20px;padding:6px 13px;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;}
  .moodtap .ic{width:16px;height:16px;}
  .mood-picker{display:flex;gap:6px;background:var(--cream);border:1px solid var(--hair);border-radius:16px;padding:10px;margin-top:-4px;margin-bottom:16px;flex-wrap:wrap;}
  .mood-picker button{flex:1;min-width:52px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;font-family:inherit;font-size:10.5px;color:var(--muted);cursor:pointer;padding:6px 2px;border-radius:10px;}
  .mood-picker button:active{background:var(--accent-soft);}
  .mood-picker .ic{width:24px;height:24px;}
  /* 今日狀態主視覺卡 */
  .hero-card{background:var(--card);border-radius:20px;padding:22px;margin-top:14px;box-shadow:var(--shadow-sm);}
  .hero-num-row{display:flex;align-items:baseline;gap:6px;margin-bottom:12px;}
  .hero-num{font-family:"Noto Serif TC",serif;font-size:32px;font-weight:500;color:var(--accent);}
  .hero-unit{font-size:13px;color:var(--muted);}
  .hero-bar{display:flex;gap:5px;margin-bottom:18px;}
  .hero-bar i{height:3px;flex:1;border-radius:2px;background:var(--accent-soft);}
  .hero-bar i.on{background:var(--accent);}

  /* 依時段的背景微調（幅度克制） */
  body.tp-morning{background:#F2ECDE;}
  body.tp-afternoon{background:#EEE8DC;}
  body.tp-evening{background:#EFE3D3;}
  body.tp-night{background:#E7E3DD;}

  .card{background:var(--card);border-radius:20px;padding:20px;margin-top:14px;box-shadow:var(--shadow);}
  .sec-head{display:flex;align-items:center;gap:8px;margin-bottom:13px;}
  .sec-head .ic{width:22px;height:22px;flex:none;}
  .sec-head .lbl{font-family:"Noto Serif TC",serif;font-size:16px;font-weight:500;color:var(--ink);}
  .mini-label{font-family:"Noto Serif TC",serif;font-size:16px;font-weight:500;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .mini-label .ic{width:16px;height:16px;}
  .more-hint{font-size:12.5px;color:var(--muted);cursor:pointer;padding:4px 2px 2px;}
  .health-num{font-family:"Noto Serif TC",serif;font-size:18px;color:var(--ink);margin-bottom:4px;}
  .health-sub{font-size:11.5px;color:var(--muted);margin-bottom:14px;line-height:1.6;}

  function renderAgenda(dateStr,host){
    host=host||main;
    var full;
    if(view==="today"){
      var seen={};full=[];
      itemsFor(dateStr).forEach(function(i){seen[i.id]=1;full.push(i);});
      items.forEach(function(i){var n=daysUntil(i.due);var lead=Math.min(i.remind||0,7);if(!seen[i.id]&&i.due&&!i.done&&n!==null&&n<=lead){full.push(i);seen[i.id]=1;}});
      full.sort(function(a,b){if(!a.time&&b.time)return 1;if(a.time&&!b.time)return -1;return a.time<b.time?-1:a.time>b.time?1:0;});
    }else{full=itemsFor(dateStr);}
    var list=full, hidden=[];
    if(view==="today"){
      list=full.filter(function(i){return i.kind==="event"||showsIn(i,mode)||dueUrgent(i);});
      hidden=full.filter(function(i){return i.kind!=="event"&&!showsIn(i,mode)&&!dueUrgent(i);});
      list.sort(function(a,b){var ea=a.kind==="event"?0:1,eb=b.kind==="event"?0:1;if(ea!==eb)return ea-eb;var ua=dueUrgent(a)?0:1,ub=dueUrgent(b)?0:1;if(ua!==ub)return ua-ub;if(!a.time&&b.time)return 1;if(a.time&&!b.time)return -1;return a.time<b.time?-1:a.time>b.time?1:0;});
    }
    if(!list.length&&!hidden.length){
      host.insertAdjacentHTML("beforeend",'<div class="empty"><span class="big">今天很清爽</span>右下角的 ＋ 加一件事</div>');
      return;
    }
    if(!list.length){
      host.insertAdjacentHTML("beforeend",'<div class="empty"><span class="big">這個情境沒有事</span>輕鬆一下也好</div>');
    }else if(view==="today"){
      var events=list.filter(function(i){return i.kind==="event";});
      var tasks=list.filter(function(i){return i.kind!=="event";});
      if(events.length){
        host.insertAdjacentHTML("beforeend",'<div class="mustdo-label">行程</div>');
        var we=document.createElement("div");we.className="agenda";
        events.forEach(function(it){we.appendChild(eventRowHtml(it));});
        host.appendChild(we);
      }
      var must=tasks.filter(function(i){return i.star;});
      var easy=tasks.filter(function(i){return !i.star;});
      var nowIt=must.find(function(i){return !i.done;})||easy.find(function(i){return !i.done;});
      if(must.length>MUSTCAP)host.insertAdjacentHTML("beforeend",'<div class="mustdo-hint">今天的大事，通常留 3-5 件就好。</div>');
      host.insertAdjacentHTML("beforeend",'<div class="mustdo-label">必須做</div>');
      if(must.length){
        var w1=document.createElement("div");w1.className="agenda";
        must.forEach(function(it){var card=rowHtml(it);if(nowIt&&it.id===nowIt.id){card.classList.add("now-card");var b=card.querySelector(".row-body");if(b)b.insertAdjacentHTML("afterbegin",'<span class="now-tag">現在</span>');}w1.appendChild(card);});
        host.appendChild(w1);
      }else{host.insertAdjacentHTML("beforeend",'<div class="mustdo-hint">點事情左邊的星號，把它放進必須做。</div>');}
      host.insertAdjacentHTML("beforeend",'<div class="easydo-label">順手做</div>');
      if(easy.length){
        var w2b=document.createElement("div");w2b.className="agenda";
        easy.forEach(function(it){var card=rowHtml(it);if(nowIt&&it.id===nowIt.id){card.classList.add("now-card");var b=card.querySelector(".row-body");if(b)b.insertAdjacentHTML("afterbegin",'<span class="now-tag">現在</span>');}w2b.appendChild(card);});
        host.appendChild(w2b);
      }else{host.insertAdjacentHTML("beforeend",'<div class="mustdo-hint">沒有其他事了。</div>');}
    }else{
      var wrap=document.createElement("div");wrap.className="agenda";
      list.forEach(function(it){wrap.appendChild(it.kind==="event"?eventRowHtml(it):rowHtml(it));});
      host.appendChild(wrap);
    }
    if(hidden.length){
      if(!showOther){
        host.insertAdjacentHTML("beforeend",'<button class="show-other" data-showother="1">還有 '+hidden.length+' 件其他情境的事</button>');
      }else{
        host.insertAdjacentHTML("beforeend",'<div class="other-label">其他情境</div>');
        var w2=document.createElement("div");w2.className="agenda dim";
        hidden.forEach(function(it){w2.appendChild(rowHtml(it));});
        host.appendChild(w2);
      }
    }
  }

  function inboxToTask(n,dateStr){items.push({id:Date.now(),cat:"",ctx:[],date:dateStr,time:"",cup:0,eng:0,title:n.text,due:"",done:false});inbox=inbox.filter(function(x){return x.id!==n.id;});saveInbox();save();}
  function openSched(id){closeSheets();schedId=id;document.getElementById("schedDate").value=ymd(new Date());scrim.classList.add("open");schedsheet.classList.add("open");}
  document.getElementById("jot").addEventListener("click",function(){openCap();});
  document.getElementById("capCancel").addEventListener("click",closeSheets);
  document.getElementById("capSave").addEventListener("click",saveCap);
  document.getElementById("capIn").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();saveCap();}});
  document.getElementById("schedCancel").addEventListener("click",closeSheets);
  document.getElementById("schedSave").addEventListener("click",function(){var d=document.getElementById("schedDate").value;if(!d)return;var n=inbox.find(function(x){return x.id===schedId;});if(n)inboxToTask(n,d);closeSheets();render();});
  document.getElementById("jot").innerHTML=ic("note");
  document.getElementById("fab").addEventListener("click",function(){if(view==="today"&&mode==="rest")openLeisure();else openSheet();});
  document.getElementById("btnCancel").addEventListener("click",closeSheet);
  document.getElementById("btnDeleteItem").addEventListener("click",function(){
    if(!editId)return;
    if(!confirm("確定要刪除這件事嗎？"))return;
    items=items.filter(function(x){return x.id!==editId;});
    markDeleted(editId);
    save();closeSheet();render();
  });
  document.getElementById("scrim").addEventListener("click",closeSheets);
  document.getElementById("dcClose").addEventListener("click",closeSheets);
  document.getElementById("btnSave").addEventListener("click",saveItem);
  document.getElementById("inTitle").addEventListener("keydown",function(e){if(e.key==="Enter")saveItem();});

  genRecurring(new Date().getFullYear(),new Date().getMonth());
  archiveOld();
  (function carryForward(){var t=ymd(new Date()),ch=false;items.forEach(function(i){if(i.kind!=="event"&&!i.done&&i.date&&i.date<t){i.date=t;i.seq=null;i.migrated=true;ch=true;}});if(ch)save();})();
  fmtDateHeader();render();

  /* ======================= 雲端同步（Realtime Database，REST）=======================
     沿用點貨/備料/茶量同一個資料庫，資料放在獨立的 bloomDays 節點，不會互相干擾。
     不需任何設定：上傳這支檔案就會自動同步。 */
  (function(){
    var DB="https://jenka-inventory-default-rtdb.asia-southeast1.firebasedatabase.app";
    var URL=DB+"/bloomDays/state.json";
    var BOOT="bd_sync_boot";                                     // 本機旗標，不進同步
    var dot=document.getElementById("syncDot");
    function setStatus(s){if(!dot)return;var map={saving:"#C99A5A",ok:"#7C9A5C",err:"#C05A5A",off:"#B9B2A6"};dot.style.background=map[s]||map.off;}
    if(!DB){ if(dot)dot.style.display="none"; return; }
    if(dot)dot.style.display="block"; setStatus("saving");

    var applyingRemote=false, lastPushedJson="", pushT=null, mirror=null, polling=false;

    function isKey(k){return /^lifeos_/.test(k);}
    function snapshotLocal(){var d={};for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(isKey(k))d[k]=localStorage.getItem(k);}return d;}

    // 任何存檔都自動觸發雲端推送
    var _set=localStorage.setItem.bind(localStorage);
    var _rm=localStorage.removeItem.bind(localStorage);
    localStorage.setItem=function(k,v){_set(k,v);if(!applyingRemote&&isKey(k))schedulePush();};
    localStorage.removeItem=function(k){_rm(k);if(!applyingRemote&&isKey(k))schedulePush();};

    function hydrateFromLocal(){
      mem=null; items=load();
      mode=loadMode(ymd(new Date()));
      try{todayMode=localStorage.getItem(TMKEY)||"context";}catch(e){todayMode="context";}
      RECUR=loadRecur(); words=loadWords(); inbox=loadInbox();
      hlog=loadH(); rgen=loadRG(); archive=loadArchive(); feat=loadFeat(); grat=loadGrat();
    }
    function applyRemote(data){
      applyingRemote=true;
      var localKeys=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(isKey(k))localKeys.push(k);}
      localKeys.forEach(function(k){if(!(k in data))_rm(k);});          // 遠端整組刪掉的才刪
      Object.keys(data).forEach(function(k){_set(k,data[k]);});
      hydrateFromLocal(); applyingRemote=false; render();
    }

    // 首次採用時的一次性聯集合併，避免兩台各自的舊資料被覆蓋掉
    function tryParse(s){try{return JSON.parse(s);}catch(e){return s;}}
    function unionArr(a,b){var out=[],seen={};function add(x){var key=(x&&typeof x==="object"&&("id" in x))?("#"+x.id):JSON.stringify(x);if(seen[key])return;seen[key]=1;out.push(x);}b.forEach(add);a.forEach(add);return out;}
    function mergeObj(a,b){var out={},k;for(k in a)out[k]=a[k];for(k in b){if(!(k in out)){out[k]=b[k];continue;}var av=out[k],bv=b[k];if(av&&bv&&typeof av==="object"&&typeof bv==="object"&&!Array.isArray(av)&&!Array.isArray(bv)){var m={},kk;for(kk in av)m[kk]=av[kk];for(kk in bv){m[kk]=(typeof av[kk]==="number"&&typeof bv[kk]==="number")?Math.max(av[kk],bv[kk]):bv[kk];}out[k]=m;}else{out[k]=bv;}}return out;}
    function mergeStates(a,b){var out={},keys={},x;for(x in a)keys[x]=1;for(x in b)keys[x]=1;Object.keys(keys).forEach(function(k){if(a[k]==null){out[k]=b[k];return;}if(b[k]==null){out[k]=a[k];return;}var pa=tryParse(a[k]),pb=tryParse(b[k]);if(Array.isArray(pa)&&Array.isArray(pb)){out[k]=JSON.stringify(unionArr(pa,pb));}else if(pa&&pb&&typeof pa==="object"&&typeof pb==="object"){out[k]=JSON.stringify(mergeObj(pa,pb));}else{out[k]=b[k];}});return out;}
    function pruneDeleted(merged){
      try{
        var delMap=tryParse(merged[DELKEY]||"{}")||{};
        var arr=tryParse(merged[KEY]||"[]")||[];
        if(Array.isArray(arr)&&delMap&&typeof delMap==="object"){
          arr=arr.filter(function(it){return !(it&&("id" in it)&&(it.id in delMap));});
          merged[KEY]=JSON.stringify(arr);
        }
      }catch(e){}
      return merged;
    }
    function booted(){try{return localStorage.getItem(BOOT)==="1";}catch(e){return false;}}
    function markBooted(){try{_set(BOOT,"1");}catch(e){}}

    function doPush(retry){
      var data=snapshotLocal(); var body=JSON.stringify(data);
      lastPushedJson=body; setStatus("saving");
      fetch(URL,{method:"PUT",headers:{"Content-Type":"application/json"},body:body})
        .then(function(r){ if(!r.ok)throw new Error("bad status"); setStatus("ok"); })
        .catch(function(){
          retry=(retry||0)+1;
          if(retry<=3){ setTimeout(function(){doPush(retry);},1500*retry); }   // 失敗自動重試，最多3次
          else { setStatus("err"); }
        });
    }
    function schedulePush(){clearTimeout(pushT);setStatus("saving");pushT=setTimeout(doPush,600);}

    // 切出App／關閉分頁前，把還在排隊等送出的變更立刻強制送出，
    // 避免這筆還沒上雲端的新資料，在下次打開時被雲端的舊版本蓋掉
    function flushNow(){
      if(!pushT)return;                                                       // 沒有排隊中的推送，不用做事
      clearTimeout(pushT); pushT=null;
      var data=snapshotLocal(); var body=JSON.stringify(data);
      lastPushedJson=body;
      try{ fetch(URL,{method:"PUT",headers:{"Content-Type":"application/json"},body:body,keepalive:true}); }catch(e){}
    }
    document.addEventListener("visibilitychange",function(){ if(document.hidden)flushNow(); });
    window.addEventListener("pagehide",flushNow);

    function onRemoteState(state){
      state=state||{};
      if(!Object.keys(state).length){                                   // 雲端空但本機有 → 用本機補回，不清空
        if(Object.keys(snapshotLocal()).length){markBooted();doPush();}
        else{markBooted();}
        return;
      }
      var rjson=JSON.stringify(state);
      if(rjson===lastPushedJson){setStatus("ok");return;}               // 自己寫入的回音
      var merged=mergeStates(snapshotLocal(),state);                    // 每次都合併「本機 ∪ 雲端」，不整份覆蓋本機
      merged=pruneDeleted(merged);                                      // 已刪除的任務不會被聯集救回來
      markBooted(); applyRemote(merged); setStatus("ok");
      if(JSON.stringify(merged)!==rjson) doPush();                      // 合併後跟雲端不同，補推一次讓其他裝置也拿到
    }

    // 定時回抓（EventSource 不可用時的後備）
    function startPoll(){if(polling)return;polling=true;setInterval(function(){fetch(URL).then(function(r){return r.ok?r.json():null;}).then(function(d){onRemoteState(d);}).catch(function(){});},12000);}

    // 即時串流：某台一改，其他裝置當下就更新
    function startStream(){
      if(typeof EventSource==="undefined"){startPoll();return;}
      var es;try{es=new EventSource(URL);}catch(e){startPoll();return;}
      function onEv(ev){
        setStatus("ok");
        try{
          var o=JSON.parse(ev.data); if(!o)return;
          var path=o.path, data=o.data;
          if(mirror==null)mirror={};
          if(path==="/"){ mirror=(data&&typeof data==="object")?data:{}; }
          else { var key=path.replace(/^\//,""); if(data===null)delete mirror[key]; else mirror[key]=data; }
          onRemoteState(mirror);
        }catch(e){}
      }
      es.addEventListener("put",onEv);
      es.addEventListener("patch",onEv);
      es.onerror=function(){ if(es.readyState===2)startPoll(); };       // 串流被擋才改用定時回抓
    }

    // 先抓一次目前雲端狀態（保證首次同步），再開即時串流
    fetch(URL).then(function(r){return r.ok?r.json():null;})
      .then(function(d){onRemoteState(d);startStream();})
      .catch(function(){setStatus("err");startStream();});
  })();
})();
</script>
</body>
